name: throughput-bench
channels:
  - conda-forge
dependencies:
  - python>=3.11,<3.14
  - pip
  # binutils provides the `as` assembler that Triton (used by torch.compile)
  # invokes via the system gcc. Without it, torch.compile fails at runtime.
  - binutils
  - pip:
    - torch>=2.0.0
    - timm>=1.0.0
    - tqdm>=4.65.0
    - olmoearth-pretrain-minimal @ git+https://github.com/allenai/olmoearth_pretrain_minimal.git@v0.0.5
    - omegaconf
    - git+https://github.com/geobreeze/geobreeze.git
