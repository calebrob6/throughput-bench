<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThroughputBencher — Globe Race</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css" rel="stylesheet">
<style>
:root {
  --bg:           #1a1612;
  --bg-soft:      #221c16;
  --panel:        rgba(32, 26, 21, 0.82);
  --ink:          #0e0b08;
  --text:         #f3ecd8;
  --muted:        #9a8f7a;
  --muted-strong: #d4c9ae;
  --accent:       #d0542c;
  --accent-dark:  #a33d1a;
  --blue:         #60a5fa;
  --red:          #ef4444;
  --radius:       14px;
  --radius-sm:    8px;
  --shadow-lg:    0 28px 80px rgba(0,0,0,0.55), 0 2px 0 rgba(255,255,255,0.04) inset;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: "Inter Tight", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  font-feature-settings: "ss01";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

#map { position: fixed; inset: 0; z-index: 0; background: #06070a; }
.maplibregl-ctrl-bottom-left,
.maplibregl-ctrl-bottom-right { display: none !important; }

.glass {
  background: var(--panel);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
}

/* Left control panel */
#panel {
  position: fixed;
  top: 20px; left: 20px;
  width: 310px;
  padding: 20px;
  display: flex; flex-direction: column; gap: 14px;
  z-index: 10;
}
.brand { font-family: "Fraunces", serif; font-weight: 500;
  font-size: 1.6rem; letter-spacing: -0.035em; line-height: 1; }
.brand .sub {
  display: block; margin-top: 6px;
  font-family: "JetBrains Mono", monospace;
  font-size: 0.62rem; letter-spacing: 0.24em;
  text-transform: uppercase; color: var(--muted);
}

label {
  display: block;
  font-family: "JetBrains Mono", monospace;
  font-size: 0.62rem; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 6px;
}

select {
  width: 100%; padding: 8px 10px;
  background: var(--bg-soft);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  color: var(--text); font-size: 13px;
  font-family: inherit;
  appearance: none;
  background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%),
                    linear-gradient(135deg, var(--muted) 50%, transparent 50%);
  background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
  background-size: 5px 5px, 5px 5px;
  background-repeat: no-repeat;
  padding-right: 28px;
}
select:focus { outline: none; border-color: var(--accent); }

label #speed-val {
  font-family: "JetBrains Mono", monospace;
  letter-spacing: 0.02em;
  color: var(--accent-strong);
  margin-left: 8px;
  font-size: 0.65rem;
}

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 5px;
  border-radius: 3px;
  background: linear-gradient(90deg,
    var(--accent) 0%,
    var(--accent) var(--v, 75%),
    rgba(255,255,255,0.1) var(--v, 75%),
    rgba(255,255,255,0.1) 100%);
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--bg);
  border: 2px solid var(--accent);
  box-shadow: 0 0 0 4px rgba(208, 84, 44, 0.18);
  cursor: pointer;
}
input[type="range"]::-moz-range-thumb {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--bg);
  border: 2px solid var(--accent);
  cursor: pointer;
}

.model-row { display: flex; align-items: center; gap: 8px; }
.model-row select { flex: 1; }
.swatch {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.swatch.a { background: var(--blue); box-shadow: 0 0 10px var(--blue); }
.swatch.b { background: var(--red);  box-shadow: 0 0 10px var(--red); }

.btn-race {
  padding: 10px 18px;
  background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
  color: var(--ink);
  border: none;
  border-radius: var(--radius-sm);
  font-family: "JetBrains Mono", monospace;
  font-size: 0.72rem; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer;
  transition: transform 140ms, box-shadow 140ms;
}
.btn-race:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(208, 84, 44, 0.32);
}
.btn-race:disabled { opacity: 0.5; cursor: progress; }

.btn-ghost {
  padding: 9px 18px;
  background: transparent;
  color: var(--muted-strong);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: var(--radius-sm);
  font-family: "JetBrains Mono", monospace;
  font-size: 0.68rem; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer;
  transition: border-color 140ms, color 140ms, background 140ms;
}
.btn-ghost:hover {
  border-color: var(--accent);
  color: var(--text);
  background: rgba(208, 84, 44, 0.06);
}

/* Explore modal */
#explore-overlay {
  position: fixed; inset: 0;
  background: rgba(14, 11, 8, 0.72);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 50;
  display: flex; align-items: center; justify-content: center;
  padding: 40px;
  animation: fadeSlide 280ms ease-out;
}
#explore-overlay.hidden { display: none; }
.explore-inner {
  width: 100%; max-width: 1200px; height: 100%; max-height: 820px;
  padding: 24px 28px;
  display: flex; flex-direction: column; gap: 14px;
}
.explore-hdr {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 20px;
}
.explore-hdr h2 {
  font-family: "Fraunces", serif; font-weight: 500;
  font-size: 1.45rem; letter-spacing: -0.03em; line-height: 1;
}
.explore-sub {
  margin-top: 6px;
  font-family: "JetBrains Mono", monospace;
  font-size: 0.64rem; letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
}
.close-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--muted-strong);
  font-size: 1.1rem; line-height: 1;
  cursor: pointer;
  transition: border-color 140ms, color 140ms;
}
.close-btn:hover { border-color: var(--accent); color: var(--text); }
.explore-controls {
  display: flex; gap: 16px;
  flex-wrap: wrap;
}
.ctl { display: flex; flex-direction: column; gap: 4px; min-width: 180px; }
.ctl label {
  font-family: "JetBrains Mono", monospace;
  font-size: 0.58rem; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--muted);
  margin: 0;
}
.ctl select {
  padding: 6px 10px;
  font-size: 12px;
}
.explore-plots {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  flex: 1; min-height: 0;
}
.plot-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-sm);
  padding: 8px;
  min-height: 0;
}
@media (max-width: 900px) {
  #explore-overlay { padding: 16px; }
  .explore-plots { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
}

#result {
  padding: 10px 12px;
  background: rgba(208, 84, 44, 0.08);
  border-left: 2px solid var(--accent);
  border-radius: 4px;
  font-size: 12px; line-height: 1.5;
  color: var(--muted-strong);
  display: none;
  animation: fadeSlide 280ms ease-out;
}
#result.visible { display: block; }
#result b { color: var(--text); font-weight: 600; }

@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: none; }
}

/* HUD chips */
#hud {
  position: fixed;
  top: 20px; right: 20px;
  z-index: 10;
  display: flex; gap: 12px;
}
.chip { padding: 12px 16px; min-width: 178px; }
.chip .hdr {
  display: flex; align-items: center; gap: 8px;
  font-family: "JetBrains Mono", monospace;
  font-size: 0.62rem; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--muted);
}
.chip .name {
  color: var(--muted-strong);
  font-family: "JetBrains Mono", monospace;
  font-size: 0.62rem;
  letter-spacing: 0.05em;
  text-transform: none;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.chip .val {
  font-family: "JetBrains Mono", monospace;
  font-size: 1.5rem; font-weight: 600;
  margin-top: 6px;
  font-variant-numeric: tabular-nums;
}
.chip.a .val { color: var(--blue); }
.chip.b .val { color: var(--red); }
.chip .unit { font-size: 0.68rem; color: var(--muted); margin-left: 4px; }
.chip .pct {
  font-family: "JetBrains Mono", monospace;
  font-size: 0.66rem; color: var(--muted); margin-top: 2px;
  font-variant-numeric: tabular-nums;
}
.chip .bar {
  height: 3px; margin-top: 8px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px; overflow: hidden;
}
.chip .bar span {
  display: block; height: 100%; width: 0%;
  transition: width 100ms linear;
}
.chip.a .bar span { background: var(--blue); }
.chip.b .bar span { background: var(--red); }

#timer {
  position: fixed;
  bottom: 20px; right: 20px;
  padding: 8px 14px;
  font-family: "JetBrains Mono", monospace;
  font-size: 0.82rem;
  font-variant-numeric: tabular-nums;
  color: var(--muted-strong);
  z-index: 10;
  letter-spacing: 0.04em;
}
#timer .mult { color: var(--muted); margin-left: 8px; font-size: 0.7rem; }

#loading {
  position: fixed;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  z-index: 100;
  font-family: "JetBrains Mono", monospace;
  font-size: 0.72rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  transition: opacity 280ms;
}
#loading.hidden { opacity: 0; pointer-events: none; }

@media (max-width: 900px) {
  #panel { width: calc(100vw - 40px); max-height: 45vh; overflow-y: auto; }
  #hud { top: auto; bottom: 64px; left: 20px; right: 20px; }
  .chip { flex: 1; min-width: 0; }
}
</style>
</head>
<body>

<div id="loading">loading globe…</div>
<div id="map"></div>

<div id="panel" class="glass">
  <h1 class="brand">ThroughputBencher<span class="sub">Globe Race</span></h1>

  <div>
    <label>Sensor · GSD</label>
    <select id="sel-gsd">
      <option value="0.3">0.3 m — high-res commercial</option>
      <option value="1">1 m — NAIP / aerial</option>
      <option value="10" selected>10 m — Sentinel-2</option>
      <option value="30">30 m — Landsat</option>
    </select>
  </div>

  <div>
    <label>Model A</label>
    <div class="model-row"><span class="swatch a"></span><select id="sel-a"></select></div>
  </div>

  <div>
    <label>Model B</label>
    <div class="model-row"><span class="swatch b"></span><select id="sel-b"></select></div>
  </div>

  <div>
    <label>Speedup <span id="speed-val">1000×</span></label>
    <input type="range" id="sl-speed" min="0" max="4" step="0.05" value="3">
  </div>

  <button id="btn-race" class="btn-race">▶ Start Race</button>
  <button id="btn-explore" class="btn-ghost">Explore data</button>

  <div id="result"></div>
</div>

<div id="explore-overlay" class="hidden">
  <div class="explore-inner glass">
    <div class="explore-hdr">
      <div>
        <h2>Model performance</h2>
        <div class="explore-sub">Throughput vs compute cost — click a family in the legend to filter.</div>
      </div>
      <button id="explore-close" class="close-btn" aria-label="Close">×</button>
    </div>
    <div class="explore-controls">
      <div class="ctl">
        <label>X axis</label>
        <select id="plot-x">
          <option value="params_M">Parameters (M)</option>
          <option value="macs_G">MACs (GFLOPs)</option>
          <option value="peak_mb">Peak memory (MB)</option>
        </select>
      </div>
      <div class="ctl">
        <label>Y axis</label>
        <select id="plot-y">
          <option value="throughput">Throughput (img/s)</option>
          <option value="coverage">Coverage (km²/s)</option>
        </select>
      </div>
    </div>
    <div class="explore-plots">
      <div id="plot-bar" class="plot-card"></div>
      <div id="plot-scatter" class="plot-card"></div>
    </div>
  </div>
</div>

<div id="hud">
  <div class="chip glass a">
    <div class="hdr"><span class="swatch a"></span><span class="name" id="name-a">—</span></div>
    <div><span class="val" id="km-a">0</span><span class="unit">km²</span></div>
    <div class="pct" id="pct-a">0% of land</div>
    <div class="bar"><span id="bar-a"></span></div>
  </div>
  <div class="chip glass b">
    <div class="hdr"><span class="swatch b"></span><span class="name" id="name-b">—</span></div>
    <div><span class="val" id="km-b">0</span><span class="unit">km²</span></div>
    <div class="pct" id="pct-b">0% of land</div>
    <div class="bar"><span id="bar-b"></span></div>
  </div>
</div>

<div id="timer">00.0 s<span class="mult" id="mult">1×</span></div>

<script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
<script type="module">

// ── Model defaults (overridden by CSV if available) ────────────────────────
let MODELS = [
  { name:"mobilenetv3_small_100", display:"MobileNetV3-S", family:"MobileNet", type:"cnn", throughput:21732 },
  { name:"resnet18", display:"ResNet-18", family:"ResNet", type:"cnn", throughput:9847 },
  { name:"regnety_004", display:"RegNetY-400MF", family:"RegNet", type:"cnn", throughput:9573 },
  { name:"vit_tiny_patch16_224", display:"ViT-Ti/16", family:"ViT", type:"vit", throughput:7101 },
  { name:"mobilenetv3_large_100", display:"MobileNetV3-L", family:"MobileNet", type:"cnn", throughput:6566 },
  { name:"efficientnet_b0", display:"EfficientNet-B0", family:"EfficientNet", type:"cnn", throughput:6199 },
  { name:"vit_small_patch16_224", display:"ViT-S/16", family:"ViT", type:"vit", throughput:4217 },
  { name:"convnext_tiny", display:"ConvNeXt-T", family:"ConvNeXt", type:"cnn", throughput:3534 },
  { name:"deit3_small_patch16_224", display:"DeiT3-S/16", family:"DeiT", type:"vit", throughput:3047 },
  { name:"resnet50", display:"ResNet-50", family:"ResNet", type:"cnn", throughput:2540 },
  { name:"coatnet_0_224", display:"CoAtNet-0", family:"CoAtNet", type:"hybrid", throughput:2332 },
  { name:"regnety_040", display:"RegNetY-4GF", family:"RegNet", type:"cnn", throughput:2133 },
  { name:"swin_tiny_patch4_window7_224", display:"Swin-T", family:"Swin", type:"vit", throughput:2130 },
  { name:"efficientnet_b4", display:"EfficientNet-B4", family:"EfficientNet", type:"cnn", throughput:1793 },
  { name:"convnext_small", display:"ConvNeXt-S", family:"ConvNeXt", type:"cnn", throughput:1731 },
  { name:"resnet101", display:"ResNet-101", family:"ResNet", type:"cnn", throughput:1504 },
  { name:"vit_base_patch16_224", display:"ViT-B/16", family:"ViT", type:"vit", throughput:1503 },
  { name:"beit_base_patch16_224", display:"BEiT-B/16", family:"BEiT", type:"vit", throughput:1285 },
  { name:"convnext_base", display:"ConvNeXt-B", family:"ConvNeXt", type:"cnn", throughput:1230 },
  { name:"swin_small_patch4_window7_224", display:"Swin-S", family:"Swin", type:"vit", throughput:1210 },
  { name:"swin_base_patch4_window7_224", display:"Swin-B", family:"Swin", type:"vit", throughput:1134 },
  { name:"deit3_base_patch16_224", display:"DeiT3-B/16", family:"DeiT", type:"vit", throughput:1100 },
  { name:"resnet152", display:"ResNet-152", family:"ResNet", type:"cnn", throughput:1062 },
  { name:"efficientnet_b7", display:"EfficientNet-B7", family:"EfficientNet", type:"cnn", throughput:768 },
  { name:"convnext_large", display:"ConvNeXt-L", family:"ConvNeXt", type:"cnn", throughput:675 },
  { name:"coatnet_2_224", display:"CoAtNet-2", family:"CoAtNet", type:"hybrid", throughput:504 },
  { name:"beit_large_patch16_224", display:"BEiT-L/16", family:"BEiT", type:"vit", throughput:381 },
  { name:"swin_large_patch4_window7_224", display:"Swin-L", family:"Swin", type:"vit", throughput:372 },
  { name:"vit_large_patch16_224", display:"ViT-L/16", family:"ViT", type:"vit", throughput:354 },
];

async function loadCSVResults() {
  try {
    const resp = await fetch('../results/benchmark_results.csv');
    if (!resp.ok) return;
    const text = await resp.text();
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',');
    const idx = {
      name: headers.indexOf('model_name'),
      display: headers.indexOf('display_name'),
      family: headers.indexOf('model_family'),
      type: headers.indexOf('model_type'),
      tp: headers.indexOf('throughput_mean'),
      task: headers.indexOf('task'),
      device: headers.indexOf('device'),
      params: headers.indexOf('params_M'),
      macs: headers.indexOf('macs_G'),
      mem: headers.indexOf('peak_memory_mb'),
    };
    const best = {};
    for (let i = 1; i < lines.length; i++) {
      const c = lines[i].split(',');
      if (c[idx.device] !== 'cuda' || c[idx.task] !== 'classification') continue;
      const tp = parseFloat(c[idx.tp]);
      if (isNaN(tp)) continue;
      const key = c[idx.name];
      const row = {
        name: c[idx.name], display: c[idx.display],
        family: c[idx.family], type: c[idx.type], throughput: tp,
        params_M: parseFloat(c[idx.params]) || null,
        macs_G:   parseFloat(c[idx.macs])   || null,
        peak_mb:  parseFloat(c[idx.mem])    || null,
      };
      if (!best[key] || tp > best[key].throughput) best[key] = row;
    }
    if (Object.keys(best).length) {
      MODELS = Object.values(best).sort((a,b) => b.throughput - a.throughput);
    }
  } catch(_) { /* fall back to defaults */ }
}

// ── Inline ray-casting point-in-polygon (no turf dep) ──────────────────────
function pointInRing(x, y, ring) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const xi = ring[i][0], yi = ring[i][1];
    const xj = ring[j][0], yj = ring[j][1];
    if (((yi > y) !== (yj > y)) &&
        (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) {
      inside = !inside;
    }
  }
  return inside;
}
function pointInLand(lon, lat, features) {
  for (const f of features) {
    const g = f.geometry;
    const polys = g.type === 'Polygon' ? [g.coordinates] : g.coordinates;
    for (const poly of polys) {
      if (!pointInRing(lon, lat, poly[0])) continue;
      let inHole = false;
      for (let k = 1; k < poly.length; k++) {
        if (pointInRing(lon, lat, poly[k])) { inHole = true; break; }
      }
      if (!inHole) return true;
    }
  }
  return false;
}

// ── Map setup ──────────────────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: 'map',
  projection: 'globe',
  style: {
    version: 8,
    projection: { type: 'globe' },
    glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
    sources: {
      'satellite': {
        type: 'raster',
        tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
        tileSize: 256,
        maxzoom: 5,
        attribution: '',
      }
    },
    sky: {
      'sky-color': '#0b0f18',
      'horizon-color': '#29211a',
      'fog-color': '#1a1612',
      'atmosphere-blend': ['interpolate', ['linear'], ['zoom'], 0, 1, 6, 0],
    },
    layers: [
      { id: 'bg', type: 'background', paint: { 'background-color': '#06070a' } },
      { id: 'satellite', type: 'raster', source: 'satellite',
        paint: { 'raster-saturation': -0.2, 'raster-contrast': 0.05 } }
    ]
  },
  center: [0, 20],
  zoom: 2.8,
  minZoom: 0.5,
  maxZoom: 5,
  bearing: 0,
  pitch: 0,
  attributionControl: false,
});

await new Promise(r => map.once('load', r));
// Belt-and-suspenders: some versions honor one but not the other.
try { map.setProjection({ type: 'globe' }); } catch (_) {}

// ── Land grid ──────────────────────────────────────────────────────────────
const LAND_URLS = [
  'https://cdn.jsdelivr.net/gh/nvkelso/natural-earth-vector@master/geojson/ne_110m_land.geojson',
  'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_land.geojson',
];
let landFeatures = null;
for (const url of LAND_URLS) {
  try {
    const r = await fetch(url);
    if (!r.ok) continue;
    landFeatures = (await r.json()).features;
    break;
  } catch (_) { /* try next */ }
}

const landPoints = [];
const STEP = 2.2;
for (let lat = -56; lat <= 78; lat += STEP) {
  for (let lon = -180; lon < 180; lon += STEP) {
    if (landFeatures
        ? pointInLand(lon, lat, landFeatures)
        : !oceanOnlyFallback(lon, lat)) {
      landPoints.push({ lon, lat });
    }
  }
}

// Coarse ocean-only fallback if land GeoJSON fails to fetch.
// Approximates: returns true if the point is almost certainly over ocean.
function oceanOnlyFallback(lon, lat) {
  if (lat < -60) return true;                                    // Southern Ocean
  if (lat > 75 && (lon < -20 || lon > 180)) return true;         // Arctic Ocean
  if (lat < -50 && lon > -60 && lon < 140) return true;          // Indian/S-Pacific
  if (lon > -150 && lon < -80 && lat < 15 && lat > -40) return true;  // E-Pacific
  if (lon > 160 || lon < -160) return true;                       // Pacific
  return false;
}
// Sweep west→east, with slight latitude jitter so each longitude band
// lights up as a vertical stripe rather than a horizontal line
landPoints.sort((a, b) => a.lon - b.lon || a.lat - b.lat);

const features = landPoints.map((p, i) => ({
  type: 'Feature',
  geometry: { type: 'Point', coordinates: [p.lon, p.lat] },
  properties: { i }
}));

map.addSource('land-grid', {
  type: 'geojson',
  data: { type: 'FeatureCollection', features }
});

// Layer A — blue (Model A)
map.addLayer({
  id: 'grid-a', type: 'circle', source: 'land-grid',
  filter: ['<', ['get', 'i'], 0],
  paint: {
    'circle-radius': ['interpolate', ['linear'], ['zoom'], 1, 2.2, 3, 3.5, 5, 5.5],
    'circle-color': '#60a5fa',
    'circle-opacity': 0.9,
    'circle-stroke-color': 'rgba(96,165,250,0.35)',
    'circle-stroke-width': 1,
  }
});

// Layer B — red (Model B), bigger than A
map.addLayer({
  id: 'grid-b', type: 'circle', source: 'land-grid',
  filter: ['<', ['get', 'i'], 0],
  paint: {
    'circle-radius': ['interpolate', ['linear'], ['zoom'], 1, 3.8, 3, 6, 5, 9],
    'circle-color': '#ef4444',
    'circle-opacity': 0.88,
    'circle-stroke-color': 'rgba(239,68,68,0.35)',
    'circle-stroke-width': 1,
  }
});

// Anchor the initial camera where the race actually starts: median of the
// first ~30 land points (avoids landing on a single outlier island).
const startPts = landPoints.slice(0, 30);
const startLon = startPts.reduce((s, p) => s + p.lon, 0) / startPts.length;
const startLat = startPts.reduce((s, p) => s + p.lat, 0) / startPts.length;
const START_VIEW = { center: [startLon + 12, startLat], zoom: 2.8 };
map.jumpTo(START_VIEW);

document.getElementById('loading').classList.add('hidden');

// ── UI wiring ──────────────────────────────────────────────────────────────
await loadCSVResults();

const $ = id => document.getElementById(id);
const selA = $('sel-a'), selB = $('sel-b'), selGSD = $('sel-gsd');
const btnRace = $('btn-race'), resultEl = $('result');
const kmA = $('km-a'), kmB = $('km-b');
const pctA = $('pct-a'), pctB = $('pct-b');
const barA = $('bar-a'), barB = $('bar-b');
const nameA = $('name-a'), nameB = $('name-b');
const timerEl = $('timer'), multEl = $('mult');
const slSpeed = $('sl-speed'), speedVal = $('speed-val');

function currentSpeedup() { return Math.pow(10, parseFloat(slSpeed.value)); }
function fmtSpeedup(x) {
  if (x >= 1000) return (x / 1000).toFixed(x >= 10000 ? 0 : 1) + 'k×';
  return Math.round(x).toLocaleString() + '×';
}
function syncSpeed() {
  const v = currentSpeedup();
  speedVal.textContent = fmtSpeedup(v);
  multEl.textContent = fmtSpeedup(v);
  const pct = ((parseFloat(slSpeed.value) - parseFloat(slSpeed.min)) /
               (parseFloat(slSpeed.max) - parseFloat(slSpeed.min))) * 100;
  slSpeed.style.setProperty('--v', pct + '%');
}
slSpeed.addEventListener('input', syncSpeed);
syncSpeed();

function populateSelects() {
  const opts = MODELS.map((m, i) => {
    const tag = m.type === 'cnn' ? 'CNN' : m.type === 'vit' ? 'ViT' : 'HYB';
    return `<option value="${i}">${tag} · ${m.display} · ${Math.round(m.throughput)} img/s</option>`;
  }).join('');
  selA.innerHTML = opts;
  selB.innerHTML = opts;
  const fastCnn = MODELS.findIndex(m => m.display.includes('EfficientNet-B0'));
  const slowVit = MODELS.findIndex(m => m.display.includes('ViT-L'));
  selA.value = fastCnn >= 0 ? fastCnn : 0;
  selB.value = slowVit >= 0 ? slowVit : MODELS.length - 1;
  updateNames();
}
function updateNames() {
  nameA.textContent = MODELS[selA.value].display;
  nameB.textContent = MODELS[selB.value].display;
  updateLayerOrder();
}
selA.addEventListener('change', updateNames);
selB.addEventListener('change', updateNames);

// ── Race state ─────────────────────────────────────────────────────────────
// Earth's total land area is ~148.94 million km² (~29.2% of the 510M km²
// surface). Antarctica, Greenland, and the major continents included.
const EARTH_LAND_KM2 = 148_940_000;

let racing = false;
let cursorA = 0, cursorB = 0;   // float indices into landPoints
let elapsed = 0;

function patchArea() {
  const gsd = parseFloat(selGSD.value);
  return (224 * gsd) ** 2 / 1e6;
}

function fmtKm(km) {
  if (km >= 1e6) return (km / 1e6).toFixed(2) + 'M';
  if (km >= 1e3) return (km / 1e3).toFixed(0) + 'k';
  return Math.round(km).toString();
}

function setCursors(a, b) {
  // Filter: show points with index <= cursor
  map.setFilter('grid-a', ['<=', ['get', 'i'], Math.floor(a)]);
  map.setFilter('grid-b', ['<=', ['get', 'i'], Math.floor(b)]);
}

function resetRace() {
  cursorA = 0; cursorB = 0; elapsed = 0;
  setCursors(-1, -1);
  kmA.textContent = '0'; kmB.textContent = '0';
  pctA.textContent = '0% of land'; pctB.textContent = '0% of land';
  barA.style.width = '0%'; barB.style.width = '0%';
  timerEl.firstChild.nodeValue = '00.0 s';
  resultEl.classList.remove('visible');
  map.easeTo({ ...START_VIEW, duration: 900 });
  updateLayerOrder();
}

function updateLayerOrder() {
  // Faster model stays on the bottom so the slower model's larger or
  // equal-size circles remain visible on top of it.
  const mA = MODELS[selA.value], mB = MODELS[selB.value];
  const slowerTop = mA.throughput >= mB.throughput ? 'grid-b' : 'grid-a';
  try { map.moveLayer(slowerTop); } catch (_) {}
}

btnRace.addEventListener('click', () => {
  if (racing) { racing = false; btnRace.textContent = '▶ Start Race'; return; }
  if (selA.value === selB.value) {
    resultEl.textContent = 'Pick two different models.';
    resultEl.classList.add('visible');
    return;
  }
  resetRace();
  racing = true;
  btnRace.textContent = '⏹ Stop';
});

// ── Animation loop ─────────────────────────────────────────────────────────
const N = landPoints.length;
let prev = performance.now();
let finished = false;
let finishHoldUntil = 0;

function step(now) {
  requestAnimationFrame(step);
  const dt = Math.min((now - prev) / 1000, 0.1);
  prev = now;

  if (racing) {
    const mA = MODELS[selA.value], mB = MODELS[selB.value];
    if (!finished) {
      const area = patchArea();
      const speedup = currentSpeedup();
      // points per second = throughput * area * speedup * N / EARTH_LAND_KM2
      const k = area * speedup * N / EARTH_LAND_KM2;
      cursorA = Math.min(N, cursorA + mA.throughput * k * dt);
      cursorB = Math.min(N, cursorB + mB.throughput * k * dt);
      elapsed += dt;
    }

    setCursors(cursorA, cursorB);

    const kmCovA = (cursorA / N) * EARTH_LAND_KM2;
    const kmCovB = (cursorB / N) * EARTH_LAND_KM2;
    kmA.textContent = fmtKm(kmCovA);
    kmB.textContent = fmtKm(kmCovB);
    const pA = (cursorA / N) * 100, pB = (cursorB / N) * 100;
    pctA.textContent = pA.toFixed(0) + '% of land';
    pctB.textContent = pB.toFixed(0) + '% of land';
    barA.style.width = Math.min(pA, 100) + '%';
    barB.style.width = Math.min(pB, 100) + '%';
    timerEl.firstChild.nodeValue = elapsed.toFixed(1).padStart(4, '0') + ' s';

    if (!finished && (cursorA >= N || cursorB >= N)) {
      finished = true;
      const winner = cursorA >= N ? mA : mB;
      const loser  = cursorA >= N ? mB : mA;
      const loserCursor = cursorA >= N ? cursorB : cursorA;
      const loserPct = (loserCursor / N) * 100;
      const loserPt  = landPoints[Math.min(N-1, Math.floor(loserCursor))];
      const where = describeLocation(loserPt.lat, loserPt.lon);
      const ratio = (winner.throughput / loser.throughput).toFixed(1);
      resultEl.innerHTML =
        `🏁 <b>${winner.display}</b> finished mapping Earth while ` +
        `<b>${loser.display}</b> is still in <b>${where}</b> ` +
        `(${loserPct.toFixed(0)}% done). ` +
        `<b>${ratio}×</b> faster.`;
      resultEl.classList.add('visible');
      finishHoldUntil = now + 2600;
    }
    if (finished && now >= finishHoldUntil) {
      racing = false;
      finished = false;
      btnRace.textContent = '▶ Start Race';
    }
  }
}

function describeLocation(lat, lon) {
  if (lat > 35 && lon > -12 && lon < 45)  return 'Europe';
  if (lat > 10 && lon >= 45 && lon < 150)  return 'Asia';
  if (lat <= 10 && lat > -11 && lon >= 95 && lon < 150) return 'Southeast Asia';
  if (lat > 15 && lon >= -170 && lon < -50) return 'North America';
  if (lat <= 15 && lat > -56 && lon >= -82 && lon < -34) return 'South America';
  if (lat > -35 && lat < 35 && lon >= -20 && lon < 52) return 'Africa';
  if (lat < -10 && lon >= 110 && lon < 180) return 'Oceania';
  if (lat > 60) return 'the Arctic';
  if (lat < -60) return 'Antarctica';
  return 'open ocean';
}

// ── Explore data modal ─────────────────────────────────────────────────────
const FAMILY_COLORS = {
  ResNet: '#4f9ad6', EfficientNet: '#5eb572', ConvNeXt: '#a586c9',
  MobileNet: '#b07c63', RegNet: '#d88bb7', ViT: '#e35b4f',
  DeiT: '#f0944a', Swin: '#c9ca4a', BEiT: '#4fb9c9', CoAtNet: '#9a8f7a',
};

let plotlyReady = null;
function ensurePlotly() {
  if (plotlyReady) return plotlyReady;
  plotlyReady = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.plot.ly/plotly-basic-2.35.2.min.js';
    s.onload = () => resolve(window.Plotly);
    s.onerror = reject;
    document.head.appendChild(s);
  });
  return plotlyReady;
}

const plotLayoutBase = {
  paper_bgcolor: 'rgba(0,0,0,0)',
  plot_bgcolor:  'rgba(0,0,0,0)',
  font: { color: '#d4c9ae', family: '"JetBrains Mono", monospace', size: 11 },
  margin: { l: 60, r: 16, t: 20, b: 70 },
  legend: { bgcolor: 'rgba(0,0,0,0)', orientation: 'h', y: -0.18, x: 0,
            font: { size: 10 } },
  hoverlabel: { bgcolor: '#221c16', bordercolor: '#d0542c',
                 font: { color: '#f3ecd8', family: '"JetBrains Mono", monospace' } },
  xaxis: { gridcolor: 'rgba(255,255,255,0.06)', zerolinecolor: 'rgba(255,255,255,0.08)',
           linecolor: 'rgba(255,255,255,0.12)', tickfont: { size: 10 } },
  yaxis: { gridcolor: 'rgba(255,255,255,0.06)', zerolinecolor: 'rgba(255,255,255,0.08)',
           linecolor: 'rgba(255,255,255,0.12)', tickfont: { size: 10 } },
};

function groupByFamily(models) {
  const g = {};
  for (const m of models) { (g[m.family] ||= []).push(m); }
  return g;
}

function yValue(m, axis) {
  if (axis === 'throughput') return m.throughput;
  if (axis === 'coverage')   return m.throughput * patchArea();
  return m[axis] ?? null;
}
function axisLabel(axis) {
  return ({
    throughput: 'Throughput (img/s)',
    coverage:   `Coverage @ ${selGSD.value}m GSD (km²/s)`,
    params_M:   'Parameters (M)',
    macs_G:     'MACs (GFLOPs)',
    peak_mb:    'Peak GPU memory (MB)',
  })[axis] || axis;
}

async function renderPlots() {
  const Plotly = await ensurePlotly();
  const xAxis = $('plot-x').value;
  const yAxis = $('plot-y').value;

  // Bar: models sorted by Y, colored by family
  const sorted = [...MODELS].sort((a, b) => (yValue(b, yAxis) ?? 0) - (yValue(a, yAxis) ?? 0));
  const byFam = groupByFamily(sorted);
  const barTraces = Object.entries(byFam).map(([fam, ms]) => ({
    type: 'bar',
    name: fam,
    x: ms.map(m => m.display),
    y: ms.map(m => yValue(m, yAxis) ?? 0),
    marker: { color: FAMILY_COLORS[fam] || '#9a8f7a',
              line: { color: 'rgba(255,255,255,0.08)', width: 0.5 } },
    hovertemplate: `<b>%{x}</b><br>${axisLabel(yAxis)}: %{y:,.1f}<extra>${fam}</extra>`,
  }));
  const barLayout = {
    ...plotLayoutBase,
    xaxis: { ...plotLayoutBase.xaxis, type: 'category',
             categoryorder: 'array',
             categoryarray: sorted.map(m => m.display),
             tickangle: -45, tickfont: { size: 9 } },
    yaxis: { ...plotLayoutBase.yaxis, type: 'log',
             title: { text: axisLabel(yAxis), font: { size: 11 } } },
    barmode: 'group', bargap: 0.25,
    margin: { l: 64, r: 16, t: 20, b: 120 },
  };

  // Scatter: X axis vs Y axis, colored by family
  const scatterModels = MODELS.filter(m =>
    yValue(m, yAxis) != null && m[xAxis] != null && m[xAxis] > 0);
  const byFamS = groupByFamily(scatterModels);
  const scatterTraces = Object.entries(byFamS).map(([fam, ms]) => ({
    type: 'scatter',
    mode: 'markers',
    name: fam,
    x: ms.map(m => m[xAxis]),
    y: ms.map(m => yValue(m, yAxis)),
    text: ms.map(m => m.display),
    marker: { size: 13, color: FAMILY_COLORS[fam] || '#9a8f7a',
              opacity: 0.88,
              line: { color: 'rgba(255,255,255,0.25)', width: 1 } },
    hovertemplate:
      `<b>%{text}</b><br>${axisLabel(xAxis)}: %{x:,.2f}` +
      `<br>${axisLabel(yAxis)}: %{y:,.1f}<extra>${fam}</extra>`,
  }));
  const scatterLayout = {
    ...plotLayoutBase,
    xaxis: { ...plotLayoutBase.xaxis, type: 'log',
             title: { text: axisLabel(xAxis), font: { size: 11 } } },
    yaxis: { ...plotLayoutBase.yaxis, type: 'log',
             title: { text: axisLabel(yAxis), font: { size: 11 } } },
  };

  const config = { displayModeBar: false, responsive: true };
  Plotly.react('plot-bar', barTraces, barLayout, config);
  Plotly.react('plot-scatter', scatterTraces, scatterLayout, config);
}

$('btn-explore').addEventListener('click', async () => {
  $('explore-overlay').classList.remove('hidden');
  try { await renderPlots(); }
  catch (e) {
    $('plot-bar').textContent = 'Could not load charts: ' + e.message;
  }
});
$('explore-close').addEventListener('click', () => {
  $('explore-overlay').classList.add('hidden');
});
$('explore-overlay').addEventListener('click', (e) => {
  if (e.target.id === 'explore-overlay') $('explore-overlay').classList.add('hidden');
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') $('explore-overlay').classList.add('hidden');
});
$('plot-x').addEventListener('change', renderPlots);
$('plot-y').addEventListener('change', renderPlots);
selGSD.addEventListener('change', () => {
  if (!$('explore-overlay').classList.contains('hidden')) renderPlots();
});

// ── Init ───────────────────────────────────────────────────────────────────
populateSelects();
setCursors(-1, -1);
requestAnimationFrame((t) => { prev = t; step(t); });

// ── Resize handling ────────────────────────────────────────────────────────
window.addEventListener('resize', () => map.resize());

</script>
</body>
</html>
